<div class="wrap-login">
	<div class="container">
		<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
			<mat-card class="login-box">
				<mat-card-header>
					<img [src]="logoUrl" alt="Logo">
				</mat-card-header>
				<mat-card-content>
					<mat-form-field appearance="outline">
						<mat-label>Email</mat-label>
						<input matInput type="email" placeholder="Enter your email" formControlName="email" required>
						<mat-icon matSuffix>email</mat-icon>
						<mat-error>{{getErrorMessage('email')}}</mat-error>
					</mat-form-field>

					<mat-form-field appearance="outline">
						<mat-label>Password</mat-label>
						<input matInput [type]="hidePassword ? 'password' : 'text'" placeholder="Enter your password" formControlName="password" required>
						<button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
							<mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
						</button>
						<mat-error>{{getErrorMessage('password')}}</mat-error>
					</mat-form-field>
				</mat-card-content>
				<mat-card-actions>
					<button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid">Login</button>
				</mat-card-actions>
			</mat-card>
		</form>
	</div>
</div>
